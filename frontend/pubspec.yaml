name: ipl_fan_battle
description: "IPL Fan Battle – Vote & Polls"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.3.0
  web_socket_channel: ^3.0.2
  shared_preferences: ^2.5.3
  uuid: ^4.3.3
  share_plus: ^10.1.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  confetti: ^0.7.0
  device_info_plus: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/brand/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default:21

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/brand/
